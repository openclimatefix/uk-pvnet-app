# Here we define all the models that are available in the app
# Batches are prepared only once, and it is assumed that all of the models configs can be unified
# by the pvnet_app.config.get_union_of_configs function

# These are the default arguments if not specified:
#    is_critical: False
#    is_day_ahead: False
#    use_adjuster: False
#    verbose_logging: False
#    save_gsp_sum: False
#    save_gsp_to_recent: False
#    uses_satellite_data: True


models:
  # ------------------------------------------------------
  # These are the new models trained with ocf-data-sampler
  # ------------------------------------------------------
  
  # Currently this model uses a 30 minute satellite delay
  - name: pvnet_intra_allbells30 # This name is important as it used for blending
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 1ff82a88e890441e4497a59b7d5e6d6836769ff7
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: 71acc4c990cf0d0cd9f01dbd1375ec4fa7e1e750
    is_critical: True
    is_day_ahead: False
    use_adjuster: True
    save_gsp_sum: False
    log_level: DEBUG
    save_gsp_to_recent: True
    uses_satellite_data: True

  # This uses 2NWP + satellite with 0-minute delay
  - name: pvnet_intra_allbells0
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: cc486ad6af6628a5d7c604c5730be748b243bc15
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: 474a138e4d8b188e07ef0d34520c896281132bf0
    is_critical: False
    is_day_ahead: False
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: True

  # Only uses ECMWF data
  - name: pvnet_da_ecmwf # This name is important as it used for blending
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 8cd379ad7769aecd532017976e9658d3fea76e02
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: 62d13dbe1458003995f671656e4db5c7b36dc912
    is_critical: True
    is_day_ahead: True
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: False

  # Only uses satellite data with 30 minute delay
  - name: pvnet_intra_sat30
    pvnet:
      repo: openclimatefix-models/pvnet_uk_region
      commit: 5fdc7ec353668d4758455430eea8e10d4c638f1e
    summation:
      repo: openclimatefix-models/pvnet_uk_summation
      commit: eb779e7aaa9e0fb5813889a8f9a02d6c518b432a
    is_critical: True
    is_day_ahead: False
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: True

  # Only uses UKV data
  - name: pvnet_da_ukv
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 4831fc755042b7b311a72b206d62032bfd606c9f
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: aff32fb46f8ecbaf6d5b2664c444a27f6bb160f4
    is_critical: True
    is_day_ahead: True
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: False

  # Day-ahead model which does not use satellite data
  - name: pvnet_da_2nwp
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 03924afeef8c83fb8daf45d555f51f7647c91e6d
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: 0b597e230753c7f0e24fb8906cce23b500f96627
    is_critical: True
    is_day_ahead: True
    use_adjuster: True
    save_gsp_sum: True
    log_level: INFO
    save_gsp_to_recent: True
    uses_satellite_data: False