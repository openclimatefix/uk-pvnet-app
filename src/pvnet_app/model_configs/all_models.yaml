# Here we define all the models that are available in the app
# Batches are prepared only once, and it is assumed that all of the models configs can be unified
# by the pvnet_app.config.get_union_of_configs function

# These are the default arguments if not specified:
#    is_critical: False
#    is_day_ahead: False
#    use_adjuster: False
#    verbose_logging: False
#    save_gsp_sum: False
#    save_gsp_to_recent: False
#    uses_satellite_data: True


models:
  # ------------------------------------------------------
  # These are the new models trained with ocf-data-sampler
  # ------------------------------------------------------
  
  # Currently this model uses a 30 minute satellite delay
  - name: pvnet_intra_allbells30
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 29071edc6f6ffdba4ce006f95c5291ef73f0258e
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: d756a68fcbafdea4b56226bd3c009d6e327856b9
    is_critical: True
    is_day_ahead: False
    use_adjuster: True
    save_gsp_sum: False
    log_level: DEBUG
    save_gsp_to_recent: True
    uses_satellite_data: True

  # This uses 2NWP + satellite with 0-minute delay
  - name: pvnet_intra_allbells0
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 87957a7b582c6530ea8f7a81dabfde0206231d54
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: c78e796211f33e6f2561dced07d1de4845fb0bac
    is_critical: False
    is_day_ahead: False
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: True

  # Only uses ECMWF data
  - name: pvnet_da_ecmwf # This name is important as it used for blending
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 8cd379ad7769aecd532017976e9658d3fea76e02
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: 62d13dbe1458003995f671656e4db5c7b36dc912
    is_critical: True
    is_day_ahead: True
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: False

  # Only uses satellite data with 30 minute delay
  - name: pvnet_intra_sat30
    pvnet:
      repo: openclimatefix-models/pvnet_uk_region
      commit: 5fdc7ec353668d4758455430eea8e10d4c638f1e
    summation:
      repo: openclimatefix-models/pvnet_uk_summation
      commit: eb779e7aaa9e0fb5813889a8f9a02d6c518b432a
    is_critical: True
    is_day_ahead: False
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: True

  # Only uses UKV data
  - name: pvnet_da_ukv
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: e76e0ee7b823ec544985b91fb0902fdb54469125
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: 48ec9568d1f5e1e83618c84a8f53384bbc2c5b74
    is_critical: True
    is_day_ahead: True
    use_adjuster: False
    save_gsp_sum: False
    log_level: INFO
    save_gsp_to_recent: False
    uses_satellite_data: False

  # Day-ahead model which does not use satellite data
  - name: pvnet_da_2nwp
    pvnet:
        repo: openclimatefix-models/pvnet_uk_region
        commit: 4b519e4bcfc6e784f390131ee310874be90c17c4
    summation:
        repo: openclimatefix-models/pvnet_uk_summation
        commit: ad347ddcbce7e8b21d67dea0f93160ab49d4fa50
    is_critical: True
    is_day_ahead: True
    use_adjuster: True
    save_gsp_sum: True
    log_level: INFO
    save_gsp_to_recent: True
    uses_satellite_data: False